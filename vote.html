<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cyber Grid — Vote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  :root {
    --bg:        #060911;
    --panel:     #0b1019;
    --raised:    #141d2e;
    --line:      rgba(125,165,220,0.18);
    --blue:      #3da9fc;
    --blue-dim:  #1c5d8f;
    --blue-bg:   rgba(61,169,252,0.10);
    --red:       #ff3b5c;
    --red-dim:   #8f1c30;
    --red-bg:    rgba(255,59,92,0.10);
    --amber:     #ffb627;
    --green:     #39ff88;
    --text-hi:   #eaf2ff;
    --text-mid:  #9fb3cc;
    --text-low:  #5d7290;
    --font-head: 'Rajdhani', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg); color: var(--text-hi);
    font-family: var(--font-head); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body { padding: 16px; display: flex; flex-direction: column; gap: 14px; max-width: 480px; margin: 0 auto; }

  /* ---- Header ---- */
  .hdr { text-align: center; padding: 12px 0 4px; }
  .hdr h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.08em; }
  .hdr .sub { font-family: var(--font-mono); font-size: 11px; color: var(--text-low); margin-top: 3px; letter-spacing: 0.05em; }

  /* ---- Status pill ---- */
  .status-bar {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 8px 14px; border-radius: 99px;
    border: 1px solid var(--line); background: var(--panel);
    font-family: var(--font-mono); font-size: 12px; color: var(--text-mid);
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-low); }
  .status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.err  { background: var(--red); }

  /* ---- Screen management ---- */
  .screen { display: none; flex-direction: column; gap: 14px; }
  .screen.active { display: flex; }

  /* ---- Team picker ---- */
  .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .team-btn {
    padding: 28px 12px; border-radius: 10px; border: 2px solid var(--line);
    background: var(--panel); cursor: pointer; text-align: center;
    transition: all 0.15s ease; user-select: none;
  }
  .team-btn:active { transform: scale(0.97); }
  .team-btn .icon { font-size: 32px; margin-bottom: 8px; }
  .team-btn .label { font-size: 18px; font-weight: 700; letter-spacing: 0.06em; }
  .team-btn .desc { font-family: var(--font-mono); font-size: 10px; color: var(--text-low); margin-top: 4px; }
  .team-btn.blue-team { border-color: var(--blue-dim); }
  .team-btn.blue-team:active, .team-btn.blue-team:hover { border-color: var(--blue); box-shadow: 0 0 18px rgba(61,169,252,0.35); }
  .team-btn.red-team  { border-color: var(--red-dim); }
  .team-btn.red-team:active, .team-btn.red-team:hover { border-color: var(--red); box-shadow: 0 0 18px rgba(255,59,92,0.35); }

  /* ---- Section labels ---- */
  .section-label {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-low); text-align: center;
  }

  /* ---- Phase banner ---- */
  .phase-banner {
    text-align: center; padding: 10px 14px;
    border-radius: 8px; border: 1px solid var(--line);
    background: var(--raised); font-size: 13px; color: var(--text-mid);
    font-family: var(--font-mono);
  }
  .phase-banner.wrong-turn { border-color: var(--amber); color: var(--amber); background: rgba(255,182,39,0.08); }
  .phase-banner.not-playing { border-color: var(--line); color: var(--text-low); }

  /* ---- Card grid ---- */
  .card-grid { display: flex; flex-direction: column; gap: 8px; }
  .vote-card {
    padding: 12px 14px; border-radius: 8px; border: 1.5px solid var(--line);
    background: var(--panel); cursor: pointer; transition: all 0.15s ease;
    user-select: none; position: relative; overflow: hidden;
  }
  .vote-card:active { transform: scale(0.98); }
  .vote-card.blue-card { border-left: 3px solid var(--blue-dim); }
  .vote-card.red-card  { border-left: 3px solid var(--red-dim); }
  .vote-card.selected.blue-card { border-color: var(--blue); background: var(--blue-bg); box-shadow: 0 0 16px rgba(61,169,252,0.3); }
  .vote-card.selected.red-card  { border-color: var(--red);  background: var(--red-bg);  box-shadow: 0 0 16px rgba(255,59,92,0.3); }
  .vote-card .card-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .vote-card .card-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-low); margin-bottom: 5px; display: flex; gap: 8px; flex-wrap: wrap; }
  .vote-card .card-desc { font-family: var(--font-mono); font-size: 11px; color: var(--text-mid); line-height: 1.45; }
  .vote-card .check { position: absolute; top: 10px; right: 12px; font-size: 18px; opacity: 0; transition: opacity 0.15s; }
  .vote-card.selected .check { opacity: 1; }
  /* difficulty pips */
  .pips { display: inline-flex; gap: 2px; }
  .pips span { width: 5px; height: 5px; border-radius: 50%; background: var(--line); }
  .pips span.on { background: var(--amber); }

  /* ---- Submit button ---- */
  .submit-btn {
    width: 100%; padding: 16px; font-family: var(--font-head); font-weight: 700;
    font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase;
    border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s ease;
    background: var(--raised); color: var(--text-low); border: 1.5px solid var(--line);
  }
  .submit-btn.ready.blue-side { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
  .submit-btn.ready.red-side  { background: var(--red-bg);  color: var(--red);  border-color: var(--red); }
  .submit-btn.ready:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---- Confirmation screen ---- */
  .confirm-card {
    padding: 28px 20px; border-radius: 10px; border: 2px solid var(--green);
    background: rgba(57,255,136,0.07); text-align: center;
  }
  .confirm-icon { font-size: 48px; margin-bottom: 10px; }
  .confirm-card h2 { font-size: 20px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
  .confirm-card .voted-for { font-size: 16px; font-weight: 600; margin: 10px 0 4px; }
  .confirm-card .voted-desc { font-family: var(--font-mono); font-size: 11px; color: var(--text-mid); line-height: 1.4; }

  /* ---- Live tally ---- */
  .tally-section { display: flex; flex-direction: column; gap: 6px; }
  .tally-row { display: flex; flex-direction: column; gap: 3px; }
  .tally-label { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--text-mid); }
  .tally-bar-track { height: 8px; border-radius: 99px; background: var(--raised); overflow: hidden; }
  .tally-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .tally-bar-fill.blue-fill { background: var(--blue); }
  .tally-bar-fill.red-fill  { background: var(--red); }
  .tally-bar-fill.winner    { background: var(--green); box-shadow: 0 0 8px var(--green); }

  /* ---- Quorum notice ---- */
  .quorum-notice {
    text-align: center; padding: 10px; border-radius: 8px;
    font-family: var(--font-mono); font-size: 12px;
    background: rgba(57,255,136,0.08); border: 1px solid var(--green); color: var(--green);
  }

  /* ---- Wrong turn notice on vote screen ---- */
  .wrong-turn-overlay {
    padding: 16px; border-radius: 8px; border: 1px solid var(--amber);
    background: rgba(255,182,39,0.08); text-align: center;
    font-family: var(--font-mono); font-size: 12px; color: var(--amber);
  }
</style>
</head>
<body>

<div class="hdr">
  <h1>CYBER GRID</h1>
  <div class="sub">SCENARIO VOTING</div>
</div>

<div class="status-bar">
  <span class="status-dot" id="conn-dot"></span>
  <span id="conn-text">connecting…</span>
</div>

<!-- SCREEN 1: Team Selection -->
<div class="screen active" id="screen-team">
  <div class="section-label">Choose your team</div>
  <div class="team-grid">
    <div class="team-btn blue-team" id="pick-blue">
      <div class="icon">🛡️</div>
      <div class="label" style="color:var(--blue)">BLUE</div>
      <div class="desc">Defenders</div>
    </div>
    <div class="team-btn red-team" id="pick-red">
      <div class="icon">☠️</div>
      <div class="label" style="color:var(--red)">RED</div>
      <div class="desc">Attackers</div>
    </div>
  </div>
</div>

<!-- SCREEN 2: Voting -->
<div class="screen" id="screen-vote">
  <div id="vote-phase-banner" class="phase-banner" style="display:none;"></div>
  <div class="section-label" id="vote-section-label">Select a scenario card to play</div>
  <div class="card-grid" id="card-grid"></div>
  <button class="submit-btn" id="submit-btn" disabled>Select a card above</button>
</div>

<!-- SCREEN 3: Confirmation + live tally -->
<div class="screen" id="screen-confirm">
  <div class="confirm-card" id="confirm-card">
    <div class="confirm-icon">✅</div>
    <h2>Vote Locked In</h2>
    <div class="voted-for" id="voted-card-name"></div>
    <div class="voted-desc" id="voted-card-desc"></div>
  </div>
  <div class="section-label">Live tally</div>
  <div class="tally-section" id="tally-section"></div>
  <div class="quorum-notice" id="quorum-notice" style="display:none;"></div>
</div>

<!-- SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="data/gameData.js"></script>
<script src="js/stateShape.js"></script>
<script src="js/firebaseConfig.js"></script>
<script>
(function () {
  // ---- Device ID (one vote per device per turn) ----
  let deviceId = localStorage.getItem("cybergrid_deviceId");
  if (!deviceId) {
    deviceId = "d_" + Date.now() + "_" + Math.random().toString(36).slice(2, 9);
    localStorage.setItem("cybergrid_deviceId", deviceId);
  }

  // ---- State ----
  let gameState = null;
  let myTeam = null;
  let myVote = null;        // cardId we voted for this turn
  let myTurnKey = null;     // turn we voted on — resets if turn changes
  let selectedCardId = null;

  // ---- DOM refs ----
  const screens = {
    team:    document.getElementById("screen-team"),
    vote:    document.getElementById("screen-vote"),
    confirm: document.getElementById("screen-confirm")
  };
  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  // ---- Connection ----
  function setConn(online) {
    document.getElementById("conn-dot").className = "status-dot " + (online ? "live" : "err");
    document.getElementById("conn-text").textContent = online ? "live" : "disconnected";
  }

  // ---- Team picker ----
  document.getElementById("pick-blue").addEventListener("click", () => chooseTeam("blue"));
  document.getElementById("pick-red").addEventListener("click",  () => chooseTeam("red"));

  function chooseTeam(side) {
    myTeam = side;
    localStorage.setItem("cybergrid_team", side);
    showScreen("vote");
    renderVoteScreen();
  }

  // Restore team from previous session if on same turn
  function restoreSession() {
    const savedTeam = localStorage.getItem("cybergrid_team");
    const savedVoteTurn = localStorage.getItem("cybergrid_voteTurn");
    const savedVoteCard = localStorage.getItem("cybergrid_voteCard");
    if (savedTeam && gameState) {
      myTeam = savedTeam;
      const currentTurnKey = gameState.turnKey || buildTurnKey(gameState);
      if (savedVoteTurn === currentTurnKey && savedVoteCard) {
        // Already voted this turn — go straight to confirmation
        myVote = savedVoteCard;
        myTurnKey = savedVoteTurn;
        showScreen("confirm");
        renderConfirmScreen();
      } else {
        // New turn or first time — show vote screen
        showScreen("vote");
        renderVoteScreen();
      }
    }
  }

  function buildTurnKey(s) {
    return "t" + (s.turnNumber || 1) + "-" + (s.turn || "blue");
  }

  // ---- Render vote screen ----
  function renderVoteScreen() {
    const banner = document.getElementById("vote-phase-banner");
    const label = document.getElementById("vote-section-label");
    const grid = document.getElementById("card-grid");
    const btn = document.getElementById("submit-btn");

    if (!myTeam) return;

    if (!gameState) {
      banner.style.display = "block";
      banner.className = "phase-banner not-playing";
      banner.textContent = "Connecting to game… if this persists, ask the facilitator to check the board.";
      grid.innerHTML = "";
      btn.disabled = true;
      btn.textContent = "Waiting for game…";
      return;
    }

    const currentTurnKey = gameState.turnKey || buildTurnKey(gameState);
    const sideClass = myTeam + "-side";

    // Check game state
    if (gameState.phase !== "playing") {
      banner.style.display = "block";
      banner.className = "phase-banner not-playing";
      banner.textContent = "Game hasn't started yet. Stand by…";
      grid.innerHTML = "";
      btn.disabled = true;
      btn.textContent = "Waiting for game to start…";
      return;
    }

    if (gameState.turn !== myTeam) {
      banner.style.display = "block";
      banner.className = "phase-banner wrong-turn";
      banner.textContent = `It's ${gameState.turn.toUpperCase()}'s turn. Wait for your team's turn.`;
      grid.innerHTML = "";
      btn.disabled = true;
      btn.textContent = "Not your turn yet…";
      return;
    }

    banner.style.display = "none";
    label.textContent = "Vote for a scenario card";

    // Reset/restore button state based on current selection
    if (selectedCardId) {
      const selCard = SCENARIO_CARDS.find(c => c.id === selectedCardId);
      btn.className = `submit-btn ready ${sideClass}`;
      btn.textContent = selCard ? `Cast vote — ${selCard.name}` : "Cast vote";
      btn.disabled = false;
    } else {
      btn.className = "submit-btn";
      btn.textContent = "Select a card above";
      btn.disabled = true;
    }

    const cards = SCENARIO_CARDS.filter(c => c.side === myTeam);
    grid.innerHTML = "";
    cards.forEach(card => {
      const pips = Array.from({ length: 5 }, (_, i) =>
        `<span class="${i < card.difficulty ? "on" : ""}"></span>`
      ).join("");
      const div = document.createElement("div");
      div.className = `vote-card ${myTeam}-card${selectedCardId === card.id ? " selected" : ""}`;
      div.innerHTML = `
        <span class="check">✓</span>
        <div class="card-name">${card.name}</div>
        <div class="card-meta">
          <span>${card.type.toUpperCase()}</span>
          <span>mod ${card.modifier >= 0 ? "+" : ""}${card.modifier}</span>
          <span>detect +${card.detectionRisk}</span>
          <span class="pips">${pips}</span>
        </div>
        <div class="card-desc">${card.description}</div>
      `;
      div.addEventListener("click", () => {
        selectedCardId = card.id;
        btn.className = `submit-btn ready ${sideClass}`;
        btn.textContent = `Cast vote — ${card.name}`;
        btn.disabled = false;
        document.querySelectorAll(".vote-card").forEach(el => el.classList.remove("selected"));
        div.classList.add("selected");
      });
      grid.appendChild(div);
    });

    btn.onclick = () => submitVote(currentTurnKey);
  }

  // ---- Submit vote ----
  function submitVote(turnKey) {
    if (!selectedCardId || !myTeam || !FireState.isReady()) return;
    const safeDeviceId = deviceId.replace(/[.#$[\]]/g, "_");
    const voteData = { cardId: selectedCardId, side: myTeam, ts: Date.now() };

    // Merge this device's vote into the votes object for the current turn.
    // FireState.update does a shallow merge at the root — we need a deep path,
    // so we build the full nested key using dot-notation that Firebase understands,
    // or simply read-modify-write via getOnce.
    FireState.getOnce().then(current => {
      const updated = current ? JSON.parse(JSON.stringify(current)) : {};
      updated.votes = updated.votes || {};
      updated.votes[turnKey] = updated.votes[turnKey] || {};
      updated.votes[turnKey][safeDeviceId] = voteData;
      return FireState.update({ votes: updated.votes });
    }).then(() => {
      myVote = selectedCardId;
      myTurnKey = turnKey;
      localStorage.setItem("cybergrid_voteTurn", turnKey);
      localStorage.setItem("cybergrid_voteCard", selectedCardId);
      showScreen("confirm");
      renderConfirmScreen();
    }).catch(err => {
      console.error("Vote failed:", err);
      alert("Vote failed — check your connection and try again.");
    });
  }

  // ---- Render confirmation + tally ----
  function renderConfirmScreen() {
    const card = SCENARIO_CARDS.find(c => c.id === myVote);
    if (card) {
      document.getElementById("voted-card-name").textContent = card.name;
      document.getElementById("voted-card-desc").textContent = card.description;
    }
    renderTally();
  }

  function renderTally() {
    if (!gameState) return;
    const currentTurnKey = gameState.turnKey || buildTurnKey(gameState);
    const allVotes = (gameState.votes && gameState.votes[currentTurnKey]) || {};
    const myTeamVotes = Object.values(allVotes).filter(v => v.side === myTeam);
    const config = gameState.votingConfig || {};
    const expected = myTeam === "blue" ? (config.blueExpected || 5) : (config.redExpected || 5);
    const quorum = Math.ceil(expected / 2);

    // Tally by card
    const tally = {};
    myTeamVotes.forEach(v => { tally[v.cardId] = (tally[v.cardId] || 0) + 1; });
    const sorted = Object.entries(tally).sort((a, b) => b[1] - a[1]);
    const totalVotes = myTeamVotes.length;
    const sideClass = myTeam === "blue" ? "blue-fill" : "red-fill";

    const container = document.getElementById("tally-section");
    container.innerHTML = "";

    if (sorted.length === 0) {
      container.innerHTML = `<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-low);text-align:center">No votes yet…</div>`;
    } else {
      sorted.forEach(([cardId, count]) => {
        const card = SCENARIO_CARDS.find(c => c.id === cardId);
        const pct = Math.round((count / expected) * 100);
        const isWinner = count >= quorum;
        const row = document.createElement("div");
        row.className = "tally-row";
        row.innerHTML = `
          <div class="tally-label">
            <span>${card ? card.name : cardId}</span>
            <span>${count} vote${count !== 1 ? "s" : ""} / ${quorum} needed</span>
          </div>
          <div class="tally-bar-track">
            <div class="tally-bar-fill ${isWinner ? "winner" : sideClass}" style="width:${Math.min(pct, 100)}%"></div>
          </div>
        `;
        container.appendChild(row);
      });
    }

    // Quorum notice
    const notice = document.getElementById("quorum-notice");
    const winner = sorted.find(([, count]) => count >= quorum);
    if (winner) {
      const winCard = SCENARIO_CARDS.find(c => c.id === winner[0]);
      notice.style.display = "block";
      notice.textContent = `✓ Quorum reached — "${winCard ? winCard.name : winner[0]}" will be played!`;
    } else {
      notice.style.display = "none";
    }

    // Total voters info
    const info = document.createElement("div");
    info.style.cssText = "font-family:var(--font-mono);font-size:10px;color:var(--text-low);text-align:center;margin-top:4px;";
    info.textContent = `${totalVotes} of ${expected} expected votes cast`;
    container.appendChild(info);
  }

  // ---- Watch Firebase ----
  FireState.subscribe((state, err) => {
    if (err) { setConn(false); return; }
    setConn(true);
    if (!state) return;

    const prevTurnKey = gameState ? (gameState.turnKey || buildTurnKey(gameState)) : null;
    gameState = state;
    const currentTurnKey = state.turnKey || buildTurnKey(state);

    // If turn changed and we voted last turn, reset
    if (prevTurnKey && currentTurnKey !== prevTurnKey) {
      myVote = null;
      selectedCardId = null;
      localStorage.removeItem("cybergrid_voteTurn");
      localStorage.removeItem("cybergrid_voteCard");
      if (myTeam) {
        showScreen("vote");
        renderVoteScreen();
        return;
      }
    }

    // Update whichever screen is active
    const activeScreen = Object.keys(screens).find(k => screens[k].classList.contains("active"));
    if (activeScreen === "vote") renderVoteScreen();
    if (activeScreen === "confirm") renderTally();
  });

  // ---- Boot ----
  FireState.init();

  // Short delay to let Firebase connect before restoring session
  setTimeout(() => {
    if (gameState) restoreSession();
    // if not connected yet, restoreSession will be called in the subscribe callback
  }, 800);

})();
</script>
</body>
</html>
