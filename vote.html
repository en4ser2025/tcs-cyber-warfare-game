<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cyber Grid — Vote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
:root {
  --bg:#060911; --panel:#0b1019; --raised:#141d2e; --line:rgba(125,165,220,0.18);
  --blue:#3da9fc; --blue-dim:#1c5d8f; --blue-bg:rgba(61,169,252,0.10);
  --red:#ff3b5c; --red-dim:#8f1c30; --red-bg:rgba(255,59,92,0.10);
  --amber:#ffb627; --green:#39ff88; --text-hi:#eaf2ff; --text-mid:#9fb3cc; --text-low:#5d7290;
  --font-head:'Rajdhani',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text-hi);font-family:var(--font-head);min-height:100vh;-webkit-font-smoothing:antialiased;}
body{padding:12px;display:flex;flex-direction:column;gap:10px;max-width:480px;margin:0 auto;}

.hdr{text-align:center;padding:8px 0 2px;}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:0.08em;}
.hdr .sub{font-family:var(--font-mono);font-size:10px;color:var(--text-low);margin-top:2px;}

.status-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 14px;border-radius:99px;border:1px solid var(--line);background:var(--panel);font-family:var(--font-mono);font-size:11px;color:var(--text-mid);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-low);}
.status-dot.live{background:var(--green);box-shadow:0 0 8px var(--green);}
.status-dot.err{background:var(--red);}

.screen{display:none;flex-direction:column;gap:10px;}
.screen.active{display:flex;}

/* Team picker */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.team-btn{padding:24px 12px;border-radius:10px;border:2px solid var(--line);background:var(--panel);cursor:pointer;text-align:center;transition:all 0.15s ease;user-select:none;}
.team-btn:active{transform:scale(0.97);}
.team-btn .icon{font-size:28px;margin-bottom:6px;}
.team-btn .label{font-size:18px;font-weight:700;letter-spacing:0.06em;}
.team-btn .desc{font-family:var(--font-mono);font-size:10px;color:var(--text-low);margin-top:3px;}
.team-btn.blue-team{border-color:var(--blue-dim);}
.team-btn.blue-team:active,.team-btn.blue-team:hover{border-color:var(--blue);box-shadow:0 0 16px rgba(61,169,252,0.3);}
.team-btn.red-team{border-color:var(--red-dim);}
.team-btn.red-team:active,.team-btn.red-team:hover{border-color:var(--red);box-shadow:0 0 16px rgba(255,59,92,0.3);}

/* Phase banner */
.phase-banner{text-align:center;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:var(--raised);font-size:12px;color:var(--text-mid);font-family:var(--font-mono);}
.phase-banner.wrong-turn{border-color:var(--amber);color:var(--amber);background:rgba(255,182,39,0.08);}
.phase-banner.not-playing{border-color:var(--line);color:var(--text-low);}
.phase-banner.move-open{border-color:var(--green);color:var(--green);background:rgba(57,255,136,0.08);}

/* Round label */
.round-label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-low);text-align:center;}

/* Card list */
.card-grid{display:flex;flex-direction:column;gap:6px;}
.vote-card{padding:10px 12px;border-radius:8px;border:1.5px solid var(--line);background:var(--panel);cursor:pointer;transition:all 0.15s ease;user-select:none;position:relative;overflow:hidden;}
.vote-card:active{transform:scale(0.98);}
.vote-card.blue-card{border-left:3px solid var(--blue-dim);}
.vote-card.red-card{border-left:3px solid var(--red-dim);}
.vote-card.selected.blue-card{border-color:var(--blue);background:var(--blue-bg);box-shadow:0 0 14px rgba(61,169,252,0.25);}
.vote-card.selected.red-card{border-color:var(--red);background:var(--red-bg);box-shadow:0 0 14px rgba(255,59,92,0.25);}
.vote-card .card-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.vote-card .card-meta{font-family:var(--font-mono);font-size:9px;color:var(--text-low);margin-bottom:4px;display:flex;gap:6px;flex-wrap:wrap;}
.vote-card .card-desc{font-family:var(--font-mono);font-size:10px;color:var(--text-mid);line-height:1.4;}
.vote-card .check{position:absolute;top:8px;right:10px;font-size:16px;opacity:0;transition:opacity 0.15s;}
.vote-card.selected .check{opacity:1;}
.pips{display:inline-flex;gap:2px;}
.pips span{width:4px;height:4px;border-radius:50%;background:var(--line);}
.pips span.on{background:var(--amber);}

/* Submit button */
.submit-btn{width:100%;padding:14px;font-family:var(--font-head);font-weight:700;font-size:15px;letter-spacing:0.05em;text-transform:uppercase;border-radius:8px;border:1.5px solid var(--line);cursor:pointer;transition:all 0.15s ease;background:var(--raised);color:var(--text-low);}
.submit-btn.ready.blue-side{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}
.submit-btn.ready.red-side{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.submit-btn.ready:active{transform:scale(0.98);}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* Confirmation */
.confirm-card{padding:22px 16px;border-radius:10px;border:2px solid var(--green);background:rgba(57,255,136,0.07);text-align:center;}
.confirm-icon{font-size:40px;margin-bottom:8px;}
.confirm-card h2{font-size:18px;font-weight:700;color:var(--green);margin-bottom:4px;}
.confirm-card .voted-for{font-size:15px;font-weight:600;margin:8px 0 3px;}
.confirm-card .voted-desc{font-family:var(--font-mono);font-size:10px;color:var(--text-mid);line-height:1.4;}

/* Tally */
.tally-section{display:flex;flex-direction:column;gap:5px;}
.tally-row{display:flex;flex-direction:column;gap:2px;}
.tally-label{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--text-mid);}
.tally-bar-track{height:7px;border-radius:99px;background:var(--raised);overflow:hidden;}
.tally-bar-fill{height:100%;border-radius:99px;transition:width 0.4s cubic-bezier(.4,0,.2,1);}
.tally-bar-fill.blue-fill{background:var(--blue);}
.tally-bar-fill.red-fill{background:var(--red);}
.tally-bar-fill.winner{background:var(--green);box-shadow:0 0 6px var(--green);}
.quorum-notice{text-align:center;padding:8px;border-radius:8px;font-family:var(--font-mono);font-size:11px;background:rgba(57,255,136,0.08);border:1px solid var(--green);color:var(--green);}
.vote-count-info{font-family:var(--font-mono);font-size:9px;color:var(--text-low);text-align:center;margin-top:2px;}

/* ==================== MINI BOARD ==================== */
.mini-board-wrap{display:flex;flex-direction:column;gap:6px;}
.mini-board-label{font-family:var(--font-mono);font-size:10px;color:var(--text-low);text-align:center;}

.mini-board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:100%;aspect-ratio:1/1;border-radius:6px;overflow:hidden;border:2px solid var(--line);touch-action:none;}

.mini-cell{position:relative;display:flex;align-items:center;justify-content:center;background:#0b1019;border:1px solid rgba(125,165,220,0.10);cursor:pointer;transition:background 0.1s;}
.mini-cell.zone-blue{background:rgba(61,169,252,0.04);}
.mini-cell.zone-red{background:rgba(255,59,92,0.04);}
.mini-cell.zone-dmz{background:repeating-linear-gradient(45deg,rgba(255,182,39,0.03) 0 4px,transparent 4px 8px);}
.mini-cell.selected{box-shadow:inset 0 0 0 2px var(--blue);}
.mini-cell.dest-valid{box-shadow:inset 0 0 0 2px var(--green);background:rgba(57,255,136,0.08);}
.mini-cell.dest-clash{box-shadow:inset 0 0 0 2px var(--amber);background:rgba(255,182,39,0.08);}

.mini-piece{width:82%;height:82%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:7px;font-weight:700;letter-spacing:0;line-height:1;}
.mini-piece.my-side{color:#fff;}
.mini-piece.my-side.blue{background:var(--blue-bg);border:1.5px solid var(--blue-dim);color:var(--blue);}
.mini-piece.my-side.red{background:var(--red-bg);border:1.5px solid var(--red-dim);color:var(--red);}
.mini-piece.my-side.boxed{opacity:0.4;filter:grayscale(0.5);}
.mini-piece.enemy{background:rgba(125,165,220,0.06);border:1px solid rgba(125,165,220,0.2);color:var(--text-low);}
.mini-piece.selected-piece{box-shadow:0 0 0 2px var(--blue);}

.move-step-label{font-family:var(--font-mono);font-size:10px;text-align:center;padding:4px 8px;border-radius:6px;border:1px solid var(--line);background:var(--raised);color:var(--text-mid);}
.move-step-label.step-2{border-color:var(--green);color:var(--green);background:rgba(57,255,136,0.08);}
.move-selection-display{font-family:var(--font-mono);font-size:10px;color:var(--text-mid);text-align:center;padding:4px;}
</style>
</head>
<body>

<div id="sprite-mount" style="display:none;"></div>

<div class="hdr">
  <h1>CYBER GRID</h1>
  <div class="sub">SCENARIO VOTING</div>
</div>

<div class="status-bar">
  <span class="status-dot" id="conn-dot"></span>
  <span id="conn-text">connecting…</span>
</div>

<!-- SCREEN 1: Team picker -->
<div class="screen active" id="screen-team">
  <div class="round-label">Choose your team</div>
  <div class="team-grid">
    <div class="team-btn blue-team" id="pick-blue">
      <div class="icon">🛡️</div>
      <div class="label" style="color:var(--blue)">BLUE</div>
      <div class="desc">Defenders</div>
    </div>
    <div class="team-btn red-team" id="pick-red">
      <div class="icon">☠️</div>
      <div class="label" style="color:var(--red)">RED</div>
      <div class="desc">Attackers</div>
    </div>
  </div>
</div>

<!-- SCREEN 2: Round 1 — Card vote -->
<div class="screen" id="screen-card">
  <div id="card-phase-banner" class="phase-banner" style="display:none;"></div>
  <div class="round-label" id="card-round-label">Round 1 — Select a Scenario Card</div>
  <div class="card-grid" id="card-grid"></div>
  <button class="submit-btn" id="card-submit-btn" disabled>Select a card above</button>
</div>

<!-- SCREEN 3: Round 2 — Move vote (mini board) -->
<div class="screen" id="screen-move">
  <div id="move-phase-banner" class="phase-banner move-open">Round 2 — Select a piece, then a destination</div>
  <div id="move-step-label" class="move-step-label">Tap one of your pieces to select it</div>
  <div id="move-selection-display" class="move-selection-display"></div>
  <div class="mini-board-wrap">
    <div class="mini-board" id="mini-board"></div>
  </div>
  <button class="submit-btn" id="move-submit-btn" disabled>Select piece and destination</button>
</div>

<!-- SCREEN 4: Confirmation + tally -->
<div class="screen" id="screen-confirm">
  <div class="confirm-card" id="confirm-card">
    <div class="confirm-icon">✅</div>
    <h2>Vote Locked In</h2>
    <div class="voted-for" id="voted-display-name"></div>
    <div class="voted-desc" id="voted-display-desc"></div>
  </div>
  <div class="round-label">Live tally</div>
  <div class="tally-section" id="tally-section"></div>
  <div class="quorum-notice" id="quorum-notice" style="display:none;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="data/gameData.js"></script>
<script src="js/stateShape.js"></script>
<script src="js/firebaseConfig.js"></script>
<script>
(function () {
  // ---- Device ID ----
  let deviceId = localStorage.getItem("cybergrid_deviceId");
  if (!deviceId) {
    deviceId = "d_" + Date.now() + "_" + Math.random().toString(36).slice(2,9);
    localStorage.setItem("cybergrid_deviceId", deviceId);
  }
  const safeId = deviceId.replace(/[.#$[\]]/g,"_");

  // ---- State ----
  let gameState = null;
  let myTeam = localStorage.getItem("cybergrid_team") || null;
  let selectedCardId = null;
  let selectedFromCell = null;
  let selectedToCell = null;
  let myCardVoteTurn = localStorage.getItem("cybergrid_cardTurn") || null;
  let myMoveVoteTurn = localStorage.getItem("cybergrid_moveTurn") || null;

  const BOARD_SIZE = 8;

  // ---- DOM refs ----
  const screens = {
    team:    document.getElementById("screen-team"),
    card:    document.getElementById("screen-card"),
    move:    document.getElementById("screen-move"),
    confirm: document.getElementById("screen-confirm"),
  };

  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove("active"));
    screens[name].classList.add("active");
    window.scrollTo(0,0);
  }

  function setConn(online) {
    document.getElementById("conn-dot").className = "status-dot " + (online ? "live" : "err");
    document.getElementById("conn-text").textContent = online ? "live" : "disconnected";
  }

  function buildTurnKey(s) { return s.turnKey || ("t" + (s.turnNumber||1) + "-" + (s.turn||"blue")); }
  function quorumFor(expected) { return Math.ceil(expected / 2); }
  function expectedFor(side) {
    const cfg = gameState && gameState.votingConfig || {};
    return side === "blue" ? (cfg.blueExpected||5) : (cfg.redExpected||5);
  }

  // ---- Team picker ----
  document.getElementById("pick-blue").addEventListener("click", () => chooseTeam("blue"));
  document.getElementById("pick-red").addEventListener("click",  () => chooseTeam("red"));

  function chooseTeam(side) {
    myTeam = side;
    localStorage.setItem("cybergrid_team", side);
    routeToCorrectScreen();
  }

  // ---- Routing ----
  function routeToCorrectScreen() {
    if (!myTeam) { showScreen("team"); return; }
    if (!gameState) { showScreen("card"); renderCardScreen(); return; }

    const currentTurnKey = buildTurnKey(gameState);
    const votePhase = gameState.votePhase || "card";

    // If game ended or not started
    if (gameState.phase !== "playing") { showScreen("card"); renderCardScreen(); return; }

    // Wrong team's turn — show card screen with "not your turn" message
    if (gameState.turn !== myTeam) { showScreen("card"); renderCardScreen(); return; }

    if (votePhase === "card") {
      // Already voted on card this turn?
      if (myCardVoteTurn === currentTurnKey) {
        showScreen("confirm"); renderConfirmScreen(); return;
      }
      showScreen("card"); renderCardScreen();
    } else if (votePhase === "move") {
      // Already voted on move this turn?
      if (myMoveVoteTurn === currentTurnKey) {
        showScreen("confirm"); renderConfirmScreen(); return;
      }
      showScreen("move"); renderMoveScreen();
    }
  }

  // ==================== ROUND 1: CARD SCREEN ====================

  function renderCardScreen() {
    const banner = document.getElementById("card-phase-banner");
    const label  = document.getElementById("card-round-label");
    const grid   = document.getElementById("card-grid");
    const btn    = document.getElementById("card-submit-btn");

    if (!gameState) {
      banner.style.display = "block"; banner.className = "phase-banner not-playing";
      banner.textContent = "Connecting to game — stand by…";
      grid.innerHTML = ""; btn.disabled = true; btn.textContent = "Waiting…"; return;
    }
    if (gameState.phase !== "playing") {
      banner.style.display = "block"; banner.className = "phase-banner not-playing";
      banner.textContent = "Game hasn't started yet. Stand by…";
      grid.innerHTML = ""; btn.disabled = true; btn.textContent = "Waiting for game…"; return;
    }
    if (gameState.turn !== myTeam) {
      banner.style.display = "block"; banner.className = "phase-banner wrong-turn";
      banner.textContent = "It's " + gameState.turn.toUpperCase() + "'s turn. Wait for your team's turn.";
      grid.innerHTML = ""; btn.disabled = true; btn.textContent = "Not your turn yet…"; return;
    }
    if ((gameState.votePhase||"card") !== "card") {
      // Move phase is open but we're on the card screen — redirect
      routeToCorrectScreen(); return;
    }

    banner.style.display = "none";
    label.textContent = "Round 1 — Vote for a Scenario Card";

    const cards = SCENARIO_CARDS.filter(c => c.side === myTeam);
    grid.innerHTML = "";
    cards.forEach(card => {
      const pips = Array.from({length:5},(_,i)=>`<span class="${i<card.difficulty?"on":""}"></span>`).join("");
      const div = document.createElement("div");
      div.className = `vote-card ${myTeam}-card${selectedCardId===card.id?" selected":""}`;
      div.innerHTML = `<span class="check">✓</span>
        <div class="card-name">${card.name}</div>
        <div class="card-meta"><span>${card.type.toUpperCase()}</span><span>mod ${card.modifier>=0?"+":""}${card.modifier}</span><span>detect +${card.detectionRisk}</span><span class="pips">${pips}</span></div>
        <div class="card-desc">${card.description}</div>`;
      div.addEventListener("click", () => {
        selectedCardId = card.id;
        btn.className = `submit-btn ready ${myTeam}-side`;
        btn.textContent = "Cast vote — " + card.name;
        btn.disabled = false;
        document.querySelectorAll(".vote-card").forEach(el=>el.classList.remove("selected"));
        div.classList.add("selected");
      });
      grid.appendChild(div);
    });

    if (selectedCardId) {
      const sc = SCENARIO_CARDS.find(c=>c.id===selectedCardId);
      btn.className = `submit-btn ready ${myTeam}-side`;
      btn.textContent = sc ? "Cast vote — "+sc.name : "Cast vote";
      btn.disabled = false;
    } else {
      btn.className = "submit-btn"; btn.textContent = "Select a card above"; btn.disabled = true;
    }

    btn.onclick = () => submitCardVote();
  }

  function submitCardVote() {
    if (!selectedCardId || !gameState || !FireState.isReady()) return;
    const turnKey = buildTurnKey(gameState);
    FireState.getOnce().then(current => {
      const updated = current ? JSON.parse(JSON.stringify(current)) : {};
      updated.votes = updated.votes || {};
      updated.votes[turnKey] = updated.votes[turnKey] || {};
      updated.votes[turnKey][safeId] = { cardId: selectedCardId, side: myTeam, ts: Date.now() };
      return FireState.update({ votes: updated.votes });
    }).then(() => {
      myCardVoteTurn = turnKey;
      localStorage.setItem("cybergrid_cardTurn", turnKey);
      showScreen("confirm"); renderConfirmScreen();
    }).catch(err => { console.error("Card vote failed:", err); alert("Vote failed — check connection."); });
  }

  // ==================== ROUND 2: MOVE SCREEN (MINI BOARD) ====================

  function renderMoveScreen() {
    if (!gameState || gameState.phase !== "playing") return;

    const stepLabel = document.getElementById("move-step-label");
    const selDisplay = document.getElementById("move-selection-display");
    const btn = document.getElementById("move-submit-btn");

    const activeCard = gameState.activeScenario ? SCENARIO_CARDS.find(c=>c.id===gameState.activeScenario.cardId) : null;
    const bannerEl = document.getElementById("move-phase-banner");
    bannerEl.textContent = activeCard
      ? `Round 2 — Moving with "${activeCard.name}"`
      : "Round 2 — Select a piece, then a destination";

    if (selectedFromCell && selectedToCell) {
      stepLabel.className = "move-step-label step-2";
      stepLabel.textContent = "Move selected — tap Submit to vote";
      const fromDef = getPieceDef(selectedFromCell);
      selDisplay.textContent = (fromDef ? fromDef.short : selectedFromCell) + " → " + selectedToCell;
      btn.className = `submit-btn ready ${myTeam}-side`;
      btn.textContent = "Submit move vote";
      btn.disabled = false;
    } else if (selectedFromCell) {
      stepLabel.className = "move-step-label step-2";
      stepLabel.textContent = "Piece selected — tap a highlighted destination";
      const fromDef = getPieceDef(selectedFromCell);
      selDisplay.textContent = (fromDef ? fromDef.name : selectedFromCell) + " selected";
      btn.className = "submit-btn"; btn.textContent = "Now tap a destination cell"; btn.disabled = true;
    } else {
      stepLabel.className = "move-step-label";
      stepLabel.textContent = "Tap one of your pieces to select it";
      selDisplay.textContent = "";
      btn.className = "submit-btn"; btn.textContent = "Select piece and destination"; btn.disabled = true;
    }

    btn.onclick = () => submitMoveVote();
    renderMiniBoard();
  }

  function getPieceDef(cellKey) {
    if (!gameState || !gameState.board) return null;
    const unit = gameState.board[cellKey];
    if (!unit) return null;
    return (unit.side === "blue" ? BLUE_PIECES : RED_PIECES).find(p => p.id === unit.pieceId) || null;
  }

  function hasLegalMove(cellKey) {
    if (!gameState || !gameState.board) return false;
    const { row, col } = parseCellKey(cellKey);
    const unit = gameState.board[cellKey];
    if (!unit) return false;
    const def = getPieceDef(cellKey);
    if (def && def.movable === false) return false;
    const neighbors = [[row-1,col],[row+1,col],[row,col-1],[row,col+1]];
    return neighbors.some(([r,c]) => {
      if (r<0||r>=BOARD_SIZE||c<0||c>=BOARD_SIZE) return false;
      const occ = gameState.board[r+","+c];
      return !occ || occ.eliminated || occ.side !== unit.side;
    });
  }

  function isAdjacent(keyA, keyB) {
    const a = parseCellKey(keyA), b = parseCellKey(keyB);
    return Math.abs(a.row-b.row) + Math.abs(a.col-b.col) === 1;
  }

  function renderMiniBoard() {
    const el = document.getElementById("mini-board");
    el.innerHTML = "";
    if (!gameState || !gameState.board) return;
    const board = gameState.board;

    for (let row = 0; row < BOARD_SIZE; row++) {
      for (let col = 0; col < BOARD_SIZE; col++) {
        const key = row + "," + col;
        const cell = document.createElement("div");
        const zone = row<=2?"red":(row>=5?"blue":"dmz");
        cell.className = "mini-cell zone-" + zone;

        // Highlight states
        if (selectedFromCell === key) {
          cell.classList.add("selected");
        } else if (selectedFromCell && !selectedToCell && isAdjacent(selectedFromCell, key)) {
          const occ = board[key];
          const fromUnit = board[selectedFromCell];
          if (!occ || occ.eliminated) {
            cell.classList.add("dest-valid");
          } else if (occ.side !== fromUnit.side) {
            cell.classList.add("dest-clash");
          }
        }

        const unit = board[key];
        if (unit && !unit.eliminated) {
          const piece = document.createElement("div");
          if (unit.side === myTeam) {
            const def = getPieceDef(key);
            const boxed = !hasLegalMove(key);
            piece.className = `mini-piece my-side ${myTeam}${boxed?" boxed":""}${selectedFromCell===key?" selected-piece":""}`;
            piece.textContent = def ? def.short : "?";
          } else {
            piece.className = "mini-piece enemy";
            piece.textContent = unit.revealed ? (getPieceDef(key)||{short:"?"}).short : "?";
          }
          cell.appendChild(piece);
        }

        cell.addEventListener("click", () => onMiniCellClick(key));
        el.appendChild(cell);
      }
    }
  }

  function onMiniCellClick(key) {
    if (!gameState || !gameState.board) return;
    const unit = gameState.board[key];

    if (!selectedFromCell) {
      // Select a friendly piece
      if (!unit || unit.eliminated || unit.side !== myTeam) return;
      const def = getPieceDef(key);
      if (def && def.movable === false) return; // can't move objective
      if (!hasLegalMove(key)) return; // boxed in
      selectedFromCell = key;
      selectedToCell = null;
      renderMoveScreen();
    } else if (!selectedToCell) {
      if (key === selectedFromCell) {
        // Deselect
        selectedFromCell = null;
        renderMoveScreen();
        return;
      }
      // Check if valid destination
      if (!isAdjacent(selectedFromCell, key)) {
        // Tapped a non-adjacent cell — maybe re-select a different piece
        const tappedUnit = gameState.board[key];
        if (tappedUnit && !tappedUnit.eliminated && tappedUnit.side === myTeam && hasLegalMove(key)) {
          selectedFromCell = key;
          selectedToCell = null;
          renderMoveScreen();
        }
        return;
      }
      const occ = gameState.board[key];
      if (occ && !occ.eliminated && occ.side === myTeam) {
        // Tapped own piece as dest — re-select instead
        selectedFromCell = key; selectedToCell = null;
        renderMoveScreen(); return;
      }
      selectedToCell = key;
      renderMoveScreen();
    } else {
      // Already have from+to, allow re-selection
      selectedFromCell = key; selectedToCell = null;
      renderMoveScreen();
    }
  }

  function submitMoveVote() {
    if (!selectedFromCell || !selectedToCell || !gameState || !FireState.isReady()) return;
    const turnKey = buildTurnKey(gameState);
    FireState.getOnce().then(current => {
      const updated = current ? JSON.parse(JSON.stringify(current)) : {};
      updated.votes = updated.votes || {};
      updated.votes[turnKey] = updated.votes[turnKey] || {};
      updated.votes[turnKey][safeId] = {
        fromCell: selectedFromCell, toCell: selectedToCell,
        side: myTeam, ts: Date.now()
      };
      return FireState.update({ votes: updated.votes });
    }).then(() => {
      myMoveVoteTurn = turnKey;
      localStorage.setItem("cybergrid_moveTurn", turnKey);
      showScreen("confirm"); renderConfirmScreen();
    }).catch(err => { console.error("Move vote failed:", err); alert("Vote failed — check connection."); });
  }

  // ==================== CONFIRM SCREEN ====================

  function renderConfirmScreen() {
    const nameEl = document.getElementById("voted-display-name");
    const descEl = document.getElementById("voted-display-desc");
    const votePhase = gameState ? (gameState.votePhase||"card") : "card";

    if (myCardVoteTurn && myMoveVoteTurn) {
      // Both rounds voted
      nameEl.textContent = "Move vote submitted";
      descEl.textContent = selectedFromCell && selectedToCell
        ? selectedFromCell + " → " + selectedToCell
        : "Your move vote has been submitted.";
    } else {
      const card = selectedCardId ? SCENARIO_CARDS.find(c=>c.id===selectedCardId) : null;
      if (card) {
        nameEl.textContent = card.name;
        descEl.textContent = votePhase === "move"
          ? "Card vote registered. Move vote round is now open — return here to vote on the move."
          : card.description;
      } else {
        nameEl.textContent = "Vote registered";
        descEl.textContent = "";
      }
    }
    renderTally();
  }

  function renderTally() {
    if (!gameState) return;
    const currentTurnKey = buildTurnKey(gameState);
    const allVotes = (gameState.votes && gameState.votes[currentTurnKey]) || {};
    const side = myTeam;
    const expected = expectedFor(side);
    const quorum = quorumFor(expected);
    const votePhase = gameState.votePhase || "card";
    const sideClass = side === "blue" ? "blue-fill" : "red-fill";

    // Build tally based on current phase
    let tally = {}, totalVotes = 0;
    if (votePhase === "card") {
      Object.values(allVotes).forEach(v => {
        if (v.side === side && v.cardId) { tally[v.cardId] = (tally[v.cardId]||0)+1; totalVotes++; }
      });
    } else {
      Object.values(allVotes).forEach(v => {
        if (v.side === side && v.fromCell && v.toCell) {
          const k = v.fromCell+"|"+v.toCell; tally[k] = (tally[k]||0)+1; totalVotes++;
        }
      });
    }
    const sorted = Object.entries(tally).sort((a,b)=>b[1]-a[1]);
    const winnerEntry = sorted.find(([,c])=>c>=quorum);

    const container = document.getElementById("tally-section");
    container.innerHTML = "";
    if (sorted.length === 0) {
      container.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-low);text-align:center">No votes yet…</div>`;
    } else {
      sorted.slice(0,6).forEach(([key, count]) => {
        let label = key;
        if (votePhase === "card") {
          const card = SCENARIO_CARDS.find(c=>c.id===key);
          label = card ? card.name : key;
        } else {
          const [from,to] = key.split("|");
          const unit = gameState.board && gameState.board[from];
          const def = unit ? (unit.side==="blue"?BLUE_PIECES:RED_PIECES).find(p=>p.id===unit.pieceId) : null;
          label = (def ? def.short : from) + " → " + to;
        }
        const pct = Math.min(100, Math.round((count/expected)*100));
        const isWinner = count >= quorum;
        const row = document.createElement("div"); row.className = "tally-row";
        row.innerHTML = `<div class="tally-label"><span>${isWinner?"✓ ":""}${label}</span><span>${count}/${quorum} needed</span></div><div class="tally-bar-track"><div class="tally-bar-fill ${isWinner?"winner":sideClass}" style="width:${pct}%"></div></div>`;
        container.appendChild(row);
      });
    }

    const notice = document.getElementById("quorum-notice");
    if (winnerEntry) {
      let winLabel = winnerEntry[0];
      if (votePhase === "card") {
        const wc = SCENARIO_CARDS.find(c=>c.id===winnerEntry[0]);
        winLabel = wc ? wc.name : winLabel;
        notice.textContent = `✓ Quorum reached — "${winLabel}" will be played!`;
      } else {
        const [from,to] = winnerEntry[0].split("|");
        notice.textContent = `✓ Quorum reached — move ${from} → ${to} will be played!`;
      }
      notice.style.display = "block";
    } else {
      notice.style.display = "none";
    }

    const info = document.createElement("div");
    info.className = "vote-count-info";
    info.textContent = `${totalVotes} of ${expected} expected ${votePhase} votes cast`;
    container.appendChild(info);
  }

  // ==================== FIREBASE SUBSCRIPTION ====================

  FireState.subscribe((s, err) => {
    if (err) { setConn(false); return; }
    setConn(true);
    if (!s) { gameState = null; if (myTeam) routeToCorrectScreen(); return; }

    const prevTurnKey = gameState ? buildTurnKey(gameState) : null;
    const prevVotePhase = gameState ? (gameState.votePhase||"card") : "card";
    gameState = s;
    const currentTurnKey = buildTurnKey(s);

    // Turn changed — reset everything
    if (prevTurnKey && currentTurnKey !== prevTurnKey) {
      selectedCardId = null; selectedFromCell = null; selectedToCell = null;
      myCardVoteTurn = null; myMoveVoteTurn = null;
      localStorage.removeItem("cybergrid_cardTurn");
      localStorage.removeItem("cybergrid_moveTurn");
    }

    // VotePhase flipped from card→move: if we already voted on card, auto-go to move screen
    if (prevVotePhase === "card" && (s.votePhase||"card") === "move" && myTeam && s.turn === myTeam) {
      if (myCardVoteTurn === currentTurnKey) {
        // Already cast card vote — now show move voting
        showScreen("move"); renderMoveScreen(); return;
      }
    }

    if (!myTeam) return;

    // Update currently-visible screen
    const activeScreen = Object.keys(screens).find(k=>screens[k].classList.contains("active"));
    if (activeScreen === "card") renderCardScreen();
    else if (activeScreen === "move") renderMoveScreen();
    else if (activeScreen === "confirm") renderTally();
    else routeToCorrectScreen();
  });

  FireState.init();
  if (myTeam) setTimeout(() => { if (gameState) routeToCorrectScreen(); }, 300);

})();
</script>
</body>
</html>
