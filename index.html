<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Grid :: Live Board</title>
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/board.css">
</head>
<body>

<!-- SVG sprite (inlined via fetch in board.js, but a static fallback include works too) -->
<div id="sprite-mount"></div>

<div class="app-shell">

  <header class="header">
    <div>
      <h1 class="font-display">CYBER GRID</h1>
      <div class="subtitle">Enterprise Defense vs Advanced Persistent Threat &mdash; Live Board</div>
    </div>
    <div class="header-status">
      <span class="pill" id="phase-pill"><span class="pill-dot"></span><span id="phase-text">SETUP</span></span>
      <span class="pill" id="turn-pill"><span class="pill-dot"></span><span id="turn-text">&mdash;</span></span>
      <span class="conn-indicator"><span class="conn-dot" id="conn-dot"></span><span id="conn-text">connecting&hellip;</span></span>
    </div>
  </header>

  <div class="panel now-playing" id="now-playing-banner" style="display:none;">
    <span class="pill" id="now-playing-side"></span>
    <div>
      <div class="card-name" id="now-playing-name">&mdash;</div>
      <div class="card-desc" id="now-playing-desc"></div>
    </div>
  </div>

  <div class="main-grid">

    <!-- LEFT: Blue roster -->
    <div class="panel roster-panel">
      <div class="panel-title">Defender Roster &mdash; Blue</div>
      <div class="roster-list" id="blue-roster"></div>
    </div>

    <!-- CENTER: board + detection meter -->
    <div style="display:flex; flex-direction:column; gap:14px;">
      <div class="panel detection-meter">
        <div class="eyebrow">SOC Detection Meter</div>
        <div class="detection-bar-track"><div class="detection-bar-fill" id="detection-fill" style="width:0%"></div></div>
        <div class="detection-label"><span id="detection-pct">0%</span><span>Threshold: intrusion caught</span></div>
      </div>

      <div class="panel board-wrap">
        <div class="board" id="board"></div>
      </div>
    </div>

    <!-- RIGHT: Red roster -->
    <div class="panel roster-panel">
      <div class="panel-title">Threat Roster &mdash; Red</div>
      <div class="roster-list" id="red-roster"></div>
    </div>
  </div>

  <div class="panel log-panel">
    <div class="panel-title">Operations Log</div>
    <div class="log-feed" id="log-feed"></div>
  </div>

  <!-- Scenario Cards — visible to all players -->
  <div class="scenario-grid">
    <div class="panel scenario-side">
      <div class="panel-title scenario-title-blue">&#x1F6E1; Defender Scenario Cards &mdash; Blue</div>
      <div class="scenario-card-list" id="public-blue-cards"></div>
    </div>
    <div class="panel scenario-side">
      <div class="panel-title scenario-title-red">&#x2620; Attacker Scenario Cards &mdash; Red</div>
      <div class="scenario-card-list" id="public-red-cards"></div>
    </div>
  </div>

</div>

<div class="win-overlay" id="win-overlay" style="display:none;">
  <div class="panel win-card" id="win-card">
    <div class="eyebrow" id="win-eyebrow">GAME OVER</div>
    <h2 id="win-title">&mdash;</h2>
    <p id="win-reason"></p>
  </div>
</div>

<!-- Firebase SDK (compat build = simplest for plain <script> usage, no bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="data/gameData.js"></script>
<script src="js/stateShape.js"></script>
<script src="js/firebaseConfig.js"></script>
<script src="js/gameEngine.js"></script>
<script src="js/board.js"></script>
</body>
</html>
